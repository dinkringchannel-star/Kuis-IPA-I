<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kuis Pertumbuhan & Perkembangan - Kelas 9</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; color: #333;
  }
  .container {
    background: #fff; border-radius: 20px; padding: 30px;
    max-width: 700px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  h1 { text-align: center; color: #4a3f8f; margin-bottom: 10px; }
  .subtitle { text-align: center; color: #10dd69; margin-bottom: 20px; font-size: 14px; }
  .info-bar {
    display: flex; justify-content: space-between;
    background: #f3f0ff; padding: 12px 18px; border-radius: 12px;
    margin-bottom: 20px; font-weight: 500;
  }
  .progress {
    height: 8px; background: #eee; border-radius: 4px;
    overflow: hidden; margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #667eea, #764ba2);
    width: 0%; transition: width .4s;
  }
  .question {
    font-size: 16px; font-weight: 500; margin-bottom: 15px;
    line-height: 1.5; color: #2c2c54;
  }
  .options { display: flex; flex-direction: column; gap: 5px; }
  .option {
    padding: 14px 16px; background: #5a15ef; border: 2px solid #e0dcf5;
    border-radius: 10px; cursor: pointer; transition: .2s;
    font-size: 15px; text-align: left;
  }
  .option:hover:not(:disabled) { background: #d62a55; transform: translateX(5px); }
  .option:disabled { cursor: not-allowed; }
  .option.correct { background: #15ef24; border-color:  #f84b1c; color: #040406; }
  .option.wrong { background: #0c0607; border-color: #e53935; color: #f1eeee; }
  .controls { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
  button {
    flex: 1; padding: 12px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #ebeeec; font-weight: 600; cursor: pointer;
    font-size: 15px; transition: .2s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,.2); }
  button:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-secondary { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .btn-small { flex: 0 0 auto; padding: 10px 14px; font-size: 13px; }
  .feedback {
    margin-top: 10px; padding: 10px; border-radius: 10px;
    font-weight: 500; text-align: center; display: none;
  }
  .feedback.show { display: block; }
  .feedback.benar { background: #c8f7c5; color: #1b5e20; }
  .feedback.salah { background: #ffcdd2; color: #b71c1c; }
  .start-screen, .end-screen { text-align: center; padding: 15px; }
  .end-screen h2 { color: #4a3f8f; margin-bottom: 5px; }
  .score-big {
    font-size: 50px; font-weight: 500;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin: 10px 0;
  }
  .hidden { display: none; }
  .music-toggle {
    position: fixed; top: 15px; right: 15px;
    background: #fff; border: none; width: 45px; height: 45px;
    border-radius: 50%; cursor: pointer; font-size: 20px;
    box-shadow: 0 3px 10px rgba(0,0,0,.2); z-index: 100;
  }
</style>
</head>
<body>

<button class="music-toggle" id="musicBtn" title="Musik">🔇</button>

<div class="container">
  <!-- Start Screen -->
  <div id="startScreen" class="start-screen">
    <h1>🌱 Kuis IPA Kelas 9</h1>
    <p class="subtitle">Pertumbuhan dan Perkembangan</p>
    <p style="margin:20px 0; color:#555;">Jawab 30 pertanyaan berikut. Setiap pertanyaan akan dibacakan otomatis. Skor akhir akan dihitung di akhir kuis.</p>
    <button onclick="mulaiKuis()">🎯 Mulai Kuis</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quizScreen" class="hidden">
    <h1>🌱 Kuis Pertumbuhan & Perkembangan</h1>
    <div class="info-bar">
      <span>Soal: <span id="qNum">1</span>/30</span>
      <span>Skor: <span id="score">0</span></span>
    </div>
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div class="question" id="questionText"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="controls">
      <button class="btn-small" onclick="bacaSoal()">🔊 Baca Lagi</button>
      <button id="nextBtn" onclick="nextSoal()" disabled>Lanjut ➡</button>
    </div>
  </div>

  <!-- End Screen -->
  <div id="endScreen" class="end-screen hidden">
    <h2>🎉 Kuis Selesai!</h2>
    <p>Skor kamu:</p>
    <div class="score-big" id="finalScore">0</div>
    <p id="pesanAkhir" style="margin-bottom:20px; color:#555;"></p>
    <button onclick="location.reload()">🔄 Ulangi Kuis</button>
  </div>
</div>

<script>
// ====== 30 PERTANYAAN ======
const soal = [
  {q:"Pertumbuhan pada tumbuhan adalah proses...", o:["Bertambahnya jumlah sel","Bertambahnya ukuran dan volume tubuh","Perubahan fungsi organ","Pematangan sel"], a:1},
  {q:"Perkembangan pada makhluk hidup berarti...", o:["Bertambahnya tinggi badan","Peningkatan kualitas dan kedewasaan sel","Bertambahnya berat badan","Pembelahan sel saja"], a:1},
  {q:"Hormon yang memengaruhi pertumbuhan tinggi badan pada manusia adalah...", o:["Insulin","Tiroksin","Somatotropin (GH)","Adrenalin"], a:2},
  {q:"Faktor internal yang memengaruhi pertumbuhan tumbuhan adalah...", o:["Cahaya dan air","Suhu dan kelembapan","Gen dan hormon","Tanah dan udara"], a:2},
  {q:"Proses perkecambahan biji yang dimulai dari penyerapan air disebut...", o:["Transpirasi","Imbibisi","Fotosintesis","Respirasi"], a:1},
  {q:"Hormon auksin pada tumbuhan berfungsi untuk...", o:["Mempercepat penuaan","Pertumbuhan memanjang ujung batang","Menghambat pertumbuhan akar","Menggugurkan daun"], a:1},
  {q:"Tahapan perkembangan manusia setelah bayi adalah...", o:["Remaja","Balita","Lansia","Dewasa"], a:1},
  {q:"Ciri pubertas pada laki-laki adalah...", o:["Menstruasi","Membesarnya payudara","Perubahan suara menjadi besar","Pinggul membesar"], a:2},
  {q:"Ciri pubertas pada perempuan adalah...", o:["Suara menjadi berat","Tumbuh kumis","Mengalami menstruasi","Dada bidang"], a:2},
  {q:"Metamorfosis sempurna pada kupu-kupu urutannya...", o:["Telur - nimfa - dewasa","Telur - larva - pupa - imago","Telur - pupa - larva","Nimfa - telur - dewasa"], a:1},
  {q:"Hewan yang mengalami metamorfosis tidak sempurna adalah...", o:["Kupu-kupu","Katak","Nyamuk","Belalang"], a:3},
  {q:"Fase pupa pada metamorfosis kupu-kupu disebut juga...", o:["Larva","Nimfa","Kepompong","Imago"], a:2},
  {q:"Pertumbuhan primer pada tumbuhan terjadi di...", o:["Kambium","Ujung akar dan batang","Daun tua","Kulit batang"], a:1},
  {q:"Pertumbuhan sekunder pada tumbuhan disebabkan oleh aktivitas...", o:["Meristem apikal","Kambium vaskuler","Epidermis","Xilem"], a:1},
  {q:"Hormon giberelin pada tumbuhan berfungsi untuk...", o:["Menggugurkan daun","Mempercepat perkecambahan dan pembungaan","Menghambat pertumbuhan","Menyebabkan buah busuk"], a:1},
  {q:"Etilen pada tumbuhan berperan dalam...", o:["Pertumbuhan akar","Pemasakan buah","Fotosintesis","Pembelahan sel"], a:1},
  {q:"Faktor eksternal pertumbuhan tumbuhan, kecuali...", o:["Cahaya","Air","Gen","Nutrisi tanah"], a:2},
  {q:"Cahaya matahari diperlukan tumbuhan untuk proses...", o:["Respirasi","Fotosintesis","Transpirasi saja","Pembusukan"], a:1},
  {q:"Etiolasi pada tumbuhan adalah gejala...", o:["Tumbuh subur di tempat terang","Tumbuh pucat dan panjang di tempat gelap","Daun menguning karena kelebihan air","Buah rontok"], a:1},
  {q:"Zigot adalah hasil peleburan antara...", o:["Spermatozoa dan ovum","Dua sel tubuh","Sel darah merah dan putih","Spermatozoa dengan spermatozoa"], a:0},
  {q:"Masa remaja pada manusia ditandai dengan...", o:["Pertumbuhan melambat","Perubahan fisik, emosional, dan hormonal","Tidak ada perubahan","Tubuh menyusut"], a:1},
  {q:"Organ reproduksi pria yang menghasilkan sperma adalah...", o:["Ovarium","Testis","Uterus","Falopi"], a:1},
  {q:"Organ reproduksi wanita yang menghasilkan sel telur adalah...", o:["Testis","Ovarium","Vagina","Serviks"], a:1},
  {q:"Siklus menstruasi normal pada wanita berlangsung sekitar...", o:["14 hari","21 hari","28 hari","40 hari"], a:2},
  {q:"Hormon yang memicu menstruasi adalah...", o:["Estrogen dan progesteron","Insulin","Adrenalin","Tiroksin"], a:0},
  {q:"Faktor yang memengaruhi pertumbuhan manusia, kecuali...", o:["Genetik","Nutrisi","Lingkungan","Warna kesukaan"], a:3},
  {q:"Katak mengalami metamorfosis dengan urutan...", o:["Telur - berudu - katak muda - katak dewasa","Telur - nimfa - dewasa","Telur - pupa - katak","Berudu - telur - katak"], a:0},
  {q:"Alat pernapasan berudu (kecebong) adalah...", o:["Paru-paru","Insang","Kulit saja","Trakea"], a:1},
  {q:"Meristem apikal terletak di...", o:["Tengah batang","Ujung akar dan ujung batang","Daun","Akar samping"], a:1},
  {q:"Tujuan utama pertumbuhan dan perkembangan adalah...", o:["Agar makhluk hidup bertambah besar saja","Mencapai kedewasaan dan kemampuan reproduksi","Menghabiskan makanan","Berubah warna"], a:1}
];

// ====== AUDIO SYSTEM ======
let audioCtx;
function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }

function playTone(freq, dur, type='sine', vol=0.2){
  initAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function suaraKlik(){ playTone(800, 0.08, 'square', 0.15); }
function suaraBenar(){
  playTone(523, 0.15, 'sine', 0.25);
  setTimeout(()=>playTone(659, 0.15, 'sine', 0.25), 150);
  setTimeout(()=>playTone(784, 0.3, 'sine', 0.25), 300);
}
function suaraSalah(){
  playTone(300, 0.2, 'sawtooth', 0.2);
  setTimeout(()=>playTone(200, 0.4, 'sawtooth', 0.2), 200);
}

// ====== MUSIK LATAR ======
let musikOn = false, musikInterval;
const nadaMusik = [261, 329, 392, 329, 261, 392, 329, 261, 349, 293, 261, 329];
let idxNada = 0;
function toggleMusik(){
  initAudio();
  musikOn = !musikOn;
  document.getElementById('musicBtn').textContent = musikOn ? '🔊' : '🔇';
  if(musikOn){
    musikInterval = setInterval(()=>{
      playTone(nadaMusik[idxNada % nadaMusik.length], 0.4, 'triangle', 0.08);
      idxNada++;
    }, 500);
  } else {
    clearInterval(musikInterval);
  }
}
document.getElementById('musicBtn').onclick = toggleMusik;

// ====== TEXT TO SPEECH ======
function bicara(teks){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(teks);
  u.lang = 'id-ID'; u.rate = 0.95; u.pitch = 1;
  speechSynthesis.speak(u);
}

// ====== GAME LOGIC ======
let idx = 0, skor = 0, sudahDijawab = false;

function mulaiKuis(){
  initAudio();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  tampilkanSoal();
  // Aktifkan musik otomatis
  if(!musikOn) toggleMusik();
}

function tampilkanSoal(){
  sudahDijawab = false;
  const s = soal[idx];
  document.getElementById('qNum').textContent = idx+1;
  document.getElementById('score').textContent = skor;
  document.getElementById('progressFill').style.width = ((idx)/30*100)+'%';
  document.getElementById('questionText').textContent = (idx+1)+". "+s.q;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').disabled = true;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  const huruf = ['A','B','C','D'];
  s.o.forEach((opsi,i)=>{
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = huruf[i]+". "+opsi;
    btn.onclick = ()=>pilihJawaban(i, btn);
    optDiv.appendChild(btn);
  });

  // Bacakan soal
  setTimeout(()=>bicara(s.q+". Pilihan: "+s.o.join(", ")), 400);
}

function bacaSoal(){
  const s = soal[idx];
  bicara(s.q+". Pilihan: "+s.o.join(", "));
}

function pilihJawaban(pilihan, btn){
  if(sudahDijawab) return;
  sudahDijawab = true;
  suaraKlik();

  const s = soal[idx];
  const buttons = document.querySelectorAll('.option');
  buttons.forEach(b=>b.disabled = true);

  const fb = document.getElementById('feedback');
  if(pilihan === s.a){
    btn.classList.add('correct');
    skor += 10;
    setTimeout(suaraBenar, 200);
    fb.textContent = '✅ Benar! +10 poin';
    fb.className = 'feedback show benar';
    setTimeout(()=>bicara("Benar!"), 400);
  } else {
    btn.classList.add('wrong');
    buttons[s.a].classList.add('correct');
    setTimeout(suaraSalah, 200);
    fb.textContent = '❌ Salah. Jawaban benar: '+['A','B','C','D'][s.a]+". "+s.o[s.a];
    fb.className = 'feedback show salah';
    setTimeout(()=>bicara("Salah. Jawaban yang benar adalah "+s.o[s.a]), 400);
  }

  document.getElementById('score').textContent = skor;
  document.getElementById('nextBtn').disabled = false;
}

function nextSoal(){
  suaraKlik();
  idx++;
  if(idx >= soal.length){
    selesai();
  } else {
    tampilkanSoal();
  }
}

function selesai(){
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent = skor;
  document.getElementById('progressFill').style.width = '100%';

  let pesan = "";
  if(skor >= 280) pesan = "🏆 Luar biasa! Kamu sangat menguasai materi!";
  else if(skor >= 200) pesan = "👍 Bagus! Terus belajar ya!";
  else if(skor >= 100) pesan = "💪 Lumayan, masih perlu belajar lagi.";
  else pesan = "📚 Jangan menyerah, ayo baca ulang materinya!";
  document.getElementById('pesanAkhir').textContent = pesan;

  if(skor >= 200) setTimeout(suaraBenar, 300);
  bicara("Kuis selesai. Skor kamu "+skor+" dari 300. "+pesan);
}
</script>
</body>
</html>
